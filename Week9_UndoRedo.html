<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Undo/Redo Editor</title>
  <style>
    :root {
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #10b981;
      --success-hover: #059669;
      --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: var(--bg-gradient);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #1f2937;
    }

    .card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      width: 100%;
      max-width: 600px;
      transform: translateY(0);
      transition: transform 0.3s ease;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 8px;
      text-align: center;
      background: var(--bg-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      text-align: center;
      font-size: 0.9rem;
      color: #6b7280;
      margin-bottom: 24px;
    }

    .editor-wrapper {
      position: relative;
    }

    textarea {
      width: 100%;
      height: 200px;
      padding: 20px;
      font-size: 1.1rem;
      line-height: 1.6;
      border-radius: 16px;
      border: 2px solid #e5e7eb;
      outline: none;
      resize: none;
      transition: all 0.2s ease;
      background: #f9fafb;
    }

    textarea:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .button-group {
      margin-top: 24px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    button {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      color: white;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(1);
    }

    .undo-btn { background-color: var(--danger); }
    .undo-btn:hover:not(:disabled) { background-color: var(--danger-hover); }

    .redo-btn { background-color: var(--success); }
    .redo-btn:hover:not(:disabled) { background-color: var(--success-hover); }

    .kdb-hint {
      margin-top: 20px;
      font-size: 0.75rem;
      color: #9ca3af;
      text-align: center;
    }

    kbd {
      background: #f3f4f6;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      padding: 2px 6px;
      font-family: monospace;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Smart Editor</h1>
    <p class="subtitle">Your progress is automatically tracked</p>

    <div class="editor-wrapper">
      <textarea id="textBox" placeholder="Type something brilliant..."></textarea>
    </div>

    <div class="button-group">
      <button id="undoBtn" class="undo-btn" onclick="undo()">
        <span>↺</span> Undo
      </button>
      <button id="redoBtn" class="redo-btn" onclick="redo()">
        Redo <span>↻</span>
      </button>
    </div>

    <div class="kdb-hint">
      Tip: Use <kbd>Ctrl</kbd> + <kbd>Z</kbd> to undo and <kbd>Ctrl</kbd> + <kbd>Y</kbd> to redo
    </div>
  </div>

  <script>
    const textBox = document.getElementById('textBox');
    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');

    let undoStack = [''];
    let redoStack = [];

    // Helper to update button states
    function updateButtons() {
      undoBtn.disabled = undoStack.length <= 1;
      redoBtn.disabled = redoStack.length === 0;
    }

    // Listen for typing
    textBox.addEventListener('input', () => {
      // Logic: Only push to stack if the value is different from the last state
      if (textBox.value !== undoStack[undoStack.length - 1]) {
        undoStack.push(textBox.value);
        redoStack = []; // Reset redo on new input
        updateButtons();
      }
    });

    function undo() {
      if (undoStack.length > 1) {
        const current = undoStack.pop();
        redoStack.push(current);
        textBox.value = undoStack[undoStack.length - 1];
        updateButtons();
      }
    }

    function redo() {
      if (redoStack.length > 0) {
        const next = redoStack.pop();
        undoStack.push(next);
        textBox.value = next;
        updateButtons();
      }
    }

    // Keyboard Shortcuts
    window.addEventListener('keydown', (e) => {
      if (e.ctrlKey || e.metaKey) { // Support for Windows/Linux and Mac
        if (e.key === 'z') {
          e.preventDefault();
          undo();
        } else if (e.key === 'y') {
          e.preventDefault();
          redo();
        }
      }
    });

    // Initial state
    updateButtons();
  </script>

</body>
</html>
