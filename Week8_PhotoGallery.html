<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Image Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* =============================================
       VARIABLES & RESET
       ============================================= */
    :root {
      --bg:         #0f172a;
      --surface:    #1e293b;
      --surface2:   #263347;
      --accent:     #38bdf8;
      --accent-dim: rgba(56, 189, 248, 0.12);
      --accent-glow:rgba(56, 189, 248, 0.35);
      --text:       #e2e8f0;
      --text-muted: #94a3b8;
      --border:     rgba(255,255,255,0.07);
      --radius:     14px;
      --shadow:     0 4px 24px rgba(0,0,0,0.4);
      --transition: 0.25s ease;
      --font-display: 'DM Serif Display', Georgia, serif;
      --font-body:    'DM Sans', system-ui, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    img { display: block; max-width: 100%; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    /* =============================================
       GRAIN TEXTURE
       ============================================= */
    .grain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 128px 128px;
    }

    /* =============================================
       CONTAINER
       ============================================= */
    .container {
      position: relative;
      z-index: 1;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* =============================================
       HEADER
       ============================================= */
    .header { padding: 52px 0 0; }

    .header-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 24px;
      margin-bottom: 28px;
    }

    .header-eyebrow {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .header-title {
      font-family: var(--font-display);
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 400;
      color: var(--text);
      line-height: 1.05;
    }

    .header-title em {
      font-style: italic;
      color: var(--accent);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .image-count {
      display: flex;
      align-items: baseline;
      gap: 5px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 18px;
    }

    .count-number {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--accent);
      line-height: 1;
    }

    .count-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      background: var(--accent);
      color: #0c1a2e;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
      padding: 11px 22px;
      border-radius: 100px;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
      white-space: nowrap;
    }

    .upload-btn:hover {
      background: #7dd3fc;
      transform: translateY(-2px);
      box-shadow: 0 8px 28px var(--accent-glow);
    }

    .upload-btn:active { transform: translateY(0); }

    .header-divider {
      height: 1px;
      background: linear-gradient(90deg, var(--accent) 0%, transparent 70%);
      opacity: 0.25;
      margin-bottom: 40px;
    }

    /* =============================================
       EMPTY STATE
       ============================================= */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 100px 24px;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    .empty-icon {
      color: var(--text-muted);
      opacity: 0.4;
      margin-bottom: 8px;
    }

    .empty-title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      color: var(--text);
    }

    .empty-sub {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 280px;
    }

    .empty-sub strong { color: var(--text); font-weight: 600; }

    .empty-upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      padding: 10px 28px;
      border: 1.5px solid var(--accent);
      border-radius: 100px;
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--transition), transform var(--transition);
    }

    .empty-upload-btn:hover {
      background: var(--accent-dim);
      transform: translateY(-2px);
    }

    .hidden { display: none !important; }

    /* =============================================
       GALLERY GRID
       ============================================= */
    .gallery {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
    }

    @media (max-width: 1200px) { .gallery { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 900px)  { .gallery { grid-template-columns: repeat(3, 1fr); gap: 14px; } }
    @media (max-width: 600px)  { .gallery { grid-template-columns: repeat(2, 1fr); gap: 12px; } }
    @media (max-width: 380px)  { .gallery { grid-template-columns: 1fr; } }

    /* =============================================
       GALLERY CARD
       ============================================= */
    .card {
      position: relative;
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      animation: cardReveal 0.45s cubic-bezier(0.22, 1, 0.36, 1) both;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      aspect-ratio: 1 / 1;
    }

    .card:hover {
      transform: scale(1.04) translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.55), 0 0 0 1px var(--accent-glow);
      border-color: rgba(56, 189, 248, 0.3);
    }

    .card:hover .card-img {
      filter: brightness(1.08) saturate(1.1);
      transform: scale(1.06);
    }

    .card:hover .card-overlay { opacity: 1; }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: filter var(--transition), transform 0.35s ease;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(15,23,42,0.88) 0%, rgba(15,23,42,0.1) 50%, transparent 100%);
      opacity: 0;
      transition: opacity var(--transition);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 12px;
    }

    .card-overlay-top { display: flex; justify-content: flex-end; }

    .card-overlay-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-name {
      font-size: 11px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70%;
    }

    .delete-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(239,68,68,0.2);
      border: 1px solid rgba(239,68,68,0.35);
      color: #f87171;
      transition: background var(--transition), transform var(--transition);
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background: rgba(239,68,68,0.5);
      transform: scale(1.12);
    }

    .expand-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: rgba(56,189,248,0.18);
      border: 1px solid rgba(56,189,248,0.3);
      color: var(--accent);
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: scale(0.88) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* =============================================
       LIGHTBOX
       ============================================= */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .lightbox.open {
      opacity: 1;
      pointer-events: all;
    }

    .lightbox-overlay {
      position: absolute;
      inset: 0;
      background: rgba(5,10,20,0.92);
      backdrop-filter: blur(16px) saturate(0.6);
      -webkit-backdrop-filter: blur(16px) saturate(0.6);
    }

    .lb-close {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 10;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), transform var(--transition), border-color var(--transition);
    }

    .lb-close:hover {
      background: var(--surface2);
      transform: scale(1.1) rotate(90deg);
      border-color: rgba(255,255,255,0.15);
    }

    .lb-nav {
      position: absolute;
      z-index: 10;
      top: 50%;
      transform: translateY(-50%);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background var(--transition), transform var(--transition), box-shadow var(--transition), border-color var(--transition);
    }

    .lb-prev { left: 20px; }
    .lb-next { right: 20px; }

    .lb-nav:hover {
      background: var(--accent);
      color: #0c1a2e;
      border-color: var(--accent);
      box-shadow: 0 0 24px var(--accent-glow);
      transform: translateY(-50%) scale(1.08);
    }

    .lightbox-content {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 90vw;
      max-height: 90vh;
      transform: scale(0.9);
      opacity: 0;
      transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.3s ease;
    }

    .lightbox.open .lightbox-content {
      transform: scale(1);
      opacity: 1;
    }

    .lightbox-img {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: var(--radius);
      box-shadow: 0 32px 80px rgba(0,0,0,0.7);
      border: 1px solid var(--border);
      transition: opacity 0.2s ease;
    }

    .lightbox-img.switching { opacity: 0; }

    .lightbox-caption {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 0 4px;
    }

    .lb-name {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 65%;
    }

    .lb-counter {
      font-family: var(--font-display);
      font-size: 14px;
      color: var(--accent);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    /* =============================================
       ANIMATIONS & SCROLLBAR
       ============================================= */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* =============================================
       RESPONSIVE
       ============================================= */
    @media (max-width: 768px) {
      .header-top { flex-direction: column; align-items: flex-start; gap: 20px; }
      .header-actions { width: 100%; justify-content: space-between; }
      .lb-nav { width: 42px; height: 42px; }
      .lb-prev { left: 10px; }
      .lb-next { right: 10px; }
      .lb-close { top: 12px; right: 12px; }
    }

    @media (max-width: 480px) {
      .container { padding: 0 14px 60px; }
      .lb-nav { display: none; }
      .lightbox-img { max-height: 75vh; }
    }
  </style>
</head>
<body>

  <div class="grain"></div>

  <div class="container">

    <header class="header">
      <div class="header-top">
        <div class="header-brand">
          <span class="header-eyebrow">Personal Collection</span>
          <h1 class="header-title">My Image <em>Gallery</em></h1>
        </div>
        <div class="header-actions">
          <div class="image-count">
            <span class="count-number" id="countNumber">0</span>
            <span class="count-label">images</span>
          </div>
          <label class="upload-btn" for="fileInput">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
            Upload Images
          </label>
          <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.webp" multiple hidden />
        </div>
      </div>
      <div class="header-divider"></div>
    </header>

    <div class="empty-state" id="emptyState">
      <div class="empty-icon">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </div>
      <p class="empty-title">No images yet</p>
      <p class="empty-sub">Click <strong>Upload Images</strong> to start building your gallery</p>
      <label class="empty-upload-btn" for="fileInput">Choose Files</label>
    </div>

    <main class="gallery" id="gallery"></main>

  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image Preview">
    <div class="lightbox-overlay" id="lightboxOverlay"></div>

    <button class="lb-close" id="lbClose" aria-label="Close">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <button class="lb-nav lb-prev" id="lbPrev" aria-label="Previous image">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <div class="lightbox-content">
      <img class="lightbox-img" id="lightboxImg" src="" alt="" />
      <div class="lightbox-caption">
        <span class="lb-name" id="lbName"></span>
        <span class="lb-counter" id="lbCounter"></span>
      </div>
    </div>

    <button class="lb-nav lb-next" id="lbNext" aria-label="Next image">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
  </div>

  <script>
    'use strict';

    // ─── State ────────────────────────────────────────────────────────────────
    const state = {
      images: [],
      currentIndex: -1,
      touchStartX: 0,
    };

    // ─── DOM References ───────────────────────────────────────────────────────
    const fileInput       = document.getElementById('fileInput');
    const gallery         = document.getElementById('gallery');
    const emptyState      = document.getElementById('emptyState');
    const countNumber     = document.getElementById('countNumber');
    const lightbox        = document.getElementById('lightbox');
    const lightboxImg     = document.getElementById('lightboxImg');
    const lightboxOverlay = document.getElementById('lightboxOverlay');
    const lbClose         = document.getElementById('lbClose');
    const lbPrev          = document.getElementById('lbPrev');
    const lbNext          = document.getElementById('lbNext');
    const lbName          = document.getElementById('lbName');
    const lbCounter       = document.getElementById('lbCounter');

    // ─── Upload ───────────────────────────────────────────────────────────────
    fileInput.addEventListener('change', handleFileInput);

    function handleFileInput(e) {
      const files = Array.from(e.target.files);
      const valid = files.filter(f => /\.(jpe?g|png|webp)$/i.test(f.name));
      if (!valid.length) return;

      valid.forEach(file => {
        const reader = new FileReader();
        reader.onload = (ev) => {
          const entry = {
            id:   Date.now() + Math.random(),
            name: file.name,
            url:  ev.target.result,
          };
          state.images.push(entry);
          addCard(entry, state.images.length - 1);
          updateCount();
          toggleEmptyState();
        };
        reader.readAsDataURL(file);
      });

      fileInput.value = '';
    }

    // ─── Gallery Card ─────────────────────────────────────────────────────────
    function addCard(entry, index) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = entry.id;
      card.style.animationDelay = `${Math.min(index * 0.04, 0.4)}s`;

      card.innerHTML = `
        <img class="card-img" src="${entry.url}" alt="${escapeHtml(entry.name)}" loading="lazy" />
        <div class="card-overlay">
          <div class="card-overlay-top">
            <button class="delete-btn" aria-label="Remove image" title="Remove">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
              </svg>
            </button>
          </div>
          <div class="card-overlay-bottom">
            <span class="card-name" title="${escapeHtml(entry.name)}">${escapeHtml(entry.name)}</span>
            <span class="expand-icon" aria-hidden="true">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <path d="M1 1l6 6M17 17l6 6M1 23l6-6M17 7l6-6"/>
              </svg>
            </span>
          </div>
        </div>
      `;

      card.addEventListener('click', (e) => {
        if (e.target.closest('.delete-btn')) return;
        openLightbox(getCurrentIndex(entry.id));
      });

      card.querySelector('.delete-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        deleteImage(entry.id, card);
      });

      gallery.appendChild(card);
    }

    function getCurrentIndex(id) {
      return state.images.findIndex(img => img.id === id);
    }

    // ─── Delete ───────────────────────────────────────────────────────────────
    function deleteImage(id, card) {
      const idx = getCurrentIndex(id);
      if (idx === -1) return;

      card.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
      card.style.transform  = 'scale(0.8)';
      card.style.opacity    = '0';

      setTimeout(() => {
        card.remove();
        state.images.splice(idx, 1);
        updateCount();
        toggleEmptyState();

        if (lightbox.classList.contains('open')) {
          if (state.images.length === 0) {
            closeLightbox();
          } else {
            showImage(Math.min(state.currentIndex, state.images.length - 1));
          }
        }
      }, 250);
    }

    // ─── Lightbox ─────────────────────────────────────────────────────────────
    function openLightbox(index) {
      state.currentIndex = index;
      showImage(index);
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      state.currentIndex = -1;
    }

    function showImage(index) {
      const img = state.images[index];
      if (!img) return;
      state.currentIndex = index;
      lightboxImg.classList.add('switching');
      setTimeout(() => {
        lightboxImg.src       = img.url;
        lightboxImg.alt       = img.name;
        lbName.textContent    = img.name;
        lbCounter.textContent = `${index + 1} / ${state.images.length}`;
        lightboxImg.classList.remove('switching');
      }, 160);
    }

    function navigate(dir) {
      if (!state.images.length) return;
      showImage((state.currentIndex + dir + state.images.length) % state.images.length);
    }

    lbClose.addEventListener('click', closeLightbox);
    lightboxOverlay.addEventListener('click', closeLightbox);
    lbPrev.addEventListener('click', () => navigate(-1));
    lbNext.addEventListener('click', () => navigate(1));

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'ArrowLeft')  navigate(-1);
      if (e.key === 'Escape')     closeLightbox();
    });

    lightbox.addEventListener('touchstart', (e) => {
      state.touchStartX = e.changedTouches[0].clientX;
    }, { passive: true });

    lightbox.addEventListener('touchend', (e) => {
      const diff = state.touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) navigate(diff > 0 ? 1 : -1);
    }, { passive: true });

    // ─── Helpers ──────────────────────────────────────────────────────────────
    function updateCount() {
      countNumber.textContent = state.images.length;
    }

    function toggleEmptyState() {
      if (state.images.length === 0) {
        emptyState.classList.remove('hidden');
        gallery.style.display = 'none';
      } else {
        emptyState.classList.add('hidden');
        gallery.style.display = 'grid';
      }
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ─── Init ─────────────────────────────────────────────────────────────────
    toggleEmptyState();
  </script>

</body>
</html>
