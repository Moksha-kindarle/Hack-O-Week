<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTask - Microsoft Style</title>
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; height: 100vh; display: flex; background-color: #fff;">

    <div style="width: 280px; background-color: #faf9f8; border-right: 1px solid #edebe9; display: flex; flex-direction: column; padding: 15px 10px;">
        <div style="font-size: 12px; color: #605e5c; padding-left: 10px; margin-bottom: 5px;">Microsoft To Do</div>
        
        <div style="display: flex; align-items: center; gap: 10px; padding: 10px; margin-bottom: 20px;">
            <div style="width: 32px; height: 32px; background: #0078d4; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold;">M</div>
            <div style="font-weight: 600; color: #201f1e;">Moksha Kindarle</div>
        </div>

        <div style="padding: 12px 10px; background-color: #f3f2f1; border-radius: 4px; display: flex; align-items: center; gap: 12px; cursor: pointer;">
            <span style="font-size: 18px;">🏠</span>
            <span style="font-size: 15px; font-weight: 600;">Tasks</span>
        </div>
        00
        <div style="margin-top: auto; color: #2b88d8; padding: 10px; cursor: pointer; font-size: 14px;">
            + New list
        </div>
    </div>

    <div style="flex-grow: 1; padding: 40px; overflow-y: auto;">
        <h1 style="margin: 0 0 30px 0; font-size: 28px; color: #174d6c; display: flex; align-items: center; gap: 10px;">
            🏠 Tasks
        </h1>

        <div style="background: #faf9f8; border: 1px solid #edebe9; border-radius: 4px; padding: 15px; margin-bottom: 30px; display: flex; flex-direction: column; gap: 10px;">
            <input type="text" id="taskText" placeholder="Add a task" style="width: 95%; border: none; background: transparent; font-size: 16px; outline: none; padding: 5px;">
            
            <div style="display: flex; gap: 10px; align-items: center; border-top: 1px solid #eee; pt: 10px; padding-top: 10px;">
                <input type="datetime-local" id="taskDate" style="border: 1px solid #ddd; padding: 5px; border-radius: 4px; font-size: 12px;">
                
                <select id="taskPriority" style="border: 1px solid #ddd; padding: 5px; border-radius: 4px; font-size: 12px;">
                    <option value="Normal">Normal</option>
                    <option value="Important">🔥 Important</option>
                    <option value="Least">🍃 Least Important</option>
                </select>

                <button onclick="addTask()" style="margin-left: auto; background: #0078d4; color: white; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: 600;">Add</button>
            </div>
        </div>

        <div id="taskList">
            </div>
    </div>

    <script>
        // Request Permission for Notifications
        if (Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        let tasks = JSON.parse(localStorage.getItem('my_tasks')) || [];

        function addTask() {
            const text = document.getElementById('taskText').value;
            const date = document.getElementById('taskDate').value;
            const priority = document.getElementById('taskPriority').value;

            if (!text || !date) {
                alert("Please enter both a task and a reminder time.");
                return;
            }

            const newTask = {
                id: Date.now(),
                text: text,
                date: date,
                priority: priority,
                done: false,
                notified: false
            };

            tasks.push(newTask);
            saveAndRender();
            
            // Clear inputs
            document.getElementById('taskText').value = '';
            document.getElementById('taskDate').value = '';
        }

        function endTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveAndRender();
        }

        function saveAndRender() {
            localStorage.setItem('my_tasks', JSON.stringify(tasks));
            render();
        }

        function render() {
            const list = document.getElementById('taskList');
            list.innerHTML = '';

            tasks.forEach(task => {
                const borderCol = task.priority === 'Important' ? '#ff4757' : (task.priority === 'Least' ? '#2ed573' : '#edebe9');
                
                const item = document.createElement('div');
                item.style = `border-bottom: 1px solid #edebe9; padding: 15px; display: flex; align-items: center; border-left: 4px solid ${borderCol}; margin-bottom: 5px;`;
                
                item.innerHTML = `
                    <div style="width: 20px; height: 20px; border: 2px solid #a19f9d; border-radius: 50%; margin-right: 15px; cursor: pointer;" onclick="endTask(${task.id})"></div>
                    <div style="flex-grow: 1;">
                        <div style="font-size: 15px; color: #201f1e;">${task.text}</div>
                        <div style="font-size: 12px; color: #605e5c;">⏰ Reminder: ${new Date(task.date).toLocaleString()} | <b>${task.priority}</b></div>
                    </div>
                    <button onclick="endTask(${task.id})" style="background: none; border: none; color: #a19f9d; cursor: pointer; font-size: 12px;">End Task</button>
                `;
                list.appendChild(item);
            });
        }

        // Checker Loop (Checks every 5 seconds)
        setInterval(() => {
            const now = new Date();
            tasks.forEach(task => {
                const taskTime = new Date(task.date);
                if (taskTime <= now && !task.notified) {
                    if (Notification.permission === "granted") {
                        new Notification("Task Reminder", { body: task.text });
                    } else {
                        alert("REMINDER: " + task.text);
                    }
                    task.notified = true;
                    saveAndRender();
                }
            });
        }, 5000);

        // Initial Load
        render();
    </script>
</body>
</html>
